<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pointless Football Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: #c9a227; color: #08080f; }
body {
  font-family: Georgia, "Times New Roman", serif;
  background: #08080f;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 20px 16px 48px;
}
#app { max-width: 640px; margin: 0 auto; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 0 8px rgba(201,162,39,0.2); } 50% { box-shadow: 0 0 20px rgba(201,162,39,0.4); } }
@keyframes slideBar { from { width: 0; } }

.header { text-align: center; margin-bottom: 32px; position: relative; }
.header-sub { color: #778899; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
.header-title { color: #c9a227; font-size: 46px; font-weight: bold; margin: 2px 0; letter-spacing: 3px; text-shadow: 0 0 40px rgba(201,162,39,0.25); }
.header-tag { color: #778899; font-size: 11px; letter-spacing: 4px; margin: 0; }
.round-badge { position: absolute; top: 0; right: 0; background: #1a1a2e; border: 1px solid #252535; border-radius: 8px; padding: 6px 14px; color: #c9a227; font-size: 13px; }

.card { background: #111118; border: 1px solid #252535; border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; animation: fadeIn 0.3s ease-out; }
.card-gold { border-color: #c9a227; }

.label { color: #778899; font-size: 12px; margin-bottom: 8px; display: block; letter-spacing: 2px; text-transform: uppercase; }

input[type="text"] {
  width: 100%; padding: 11px 14px; background: #0c0c14; border: 1px solid #252535;
  border-radius: 8px; color: #e0e0e0; font-family: Georgia, serif; font-size: 15px;
  outline: none; box-sizing: border-box; transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: #c9a227; }

.btn {
  padding: 12px 28px; background: #c9a227; color: #08080f; border: none; border-radius: 8px;
  font-family: Georgia, serif; font-size: 15px; font-weight: bold; cursor: pointer;
  letter-spacing: 1px; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-big { padding: 15px 52px; font-size: 17px; }
.btn-outline {
  padding: 9px 18px; background: transparent; color: #c9a227; border: 1px solid #c9a227;
  border-radius: 8px; font-family: Georgia, serif; font-size: 13px; cursor: pointer;
}
.btn-outline:hover { background: rgba(201,162,39,0.1); }
.btn-round { padding: 9px 18px; border-radius: 8px; font-family: Georgia, serif; font-size: 14px; cursor: pointer; border: 1px solid #c9a227; background: transparent; color: #c9a227; flex: 1; }
.btn-round.active { background: #c9a227; color: #08080f; font-weight: bold; }
.btn-remove { padding: 4px 10px; background: transparent; color: #555; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 12px; }

.player-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.player-num { color: #c9a227; font-size: 14px; min-width: 22px; }
.player-name { color: #c9a227; font-size: 13px; margin-bottom: 5px; }

.round-select { display: flex; gap: 8px; }
.diff-select { display: flex; gap: 8px; }

.diff-easy .btn-round.active { background: #4caf50; border-color: #4caf50; color: #000; }
.diff-medium .btn-round.active { background: #c9a227; border-color: #c9a227; color: #08080f; }
.diff-hard .btn-round.active { background: #dc3545; border-color: #dc3545; color: #fff; }

.diff-desc { color: #556677; font-size: 11px; margin-top: 6px; font-style: italic; }

.center { text-align: center; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.mt24 { margin-top: 24px; }
.mb10 { margin-bottom: 10px; }
.mb12 { margin-bottom: 12px; }

.category { color: #c9a227; font-size: 11px; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
.question-text { font-size: 18px; line-height: 1.55; color: #e8e8e8; }
.difficulty-tag { display: inline-block; font-size: 10px; letter-spacing: 2px; padding: 2px 8px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; }
.diff-tag-easy { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); }
.diff-tag-medium { background: rgba(201,162,39,0.15); color: #c9a227; border: 1px solid rgba(201,162,39,0.3); }
.diff-tag-hard { background: rgba(220,53,69,0.15); color: #dc3545; border: 1px solid rgba(220,53,69,0.3); }

.spinner { display: flex; align-items: center; gap: 14px; padding: 28px 0; justify-content: center; }
.spinner-circle { width: 28px; height: 28px; border: 3px solid #252535; border-top: 3px solid #c9a227; border-radius: 50%; animation: spin 0.8s linear infinite; }
.spinner-text { color: #c9a227; font-style: italic; font-size: 15px; }

.error-box { background: #1a0000; border: 1px solid #4a0000; border-radius: 8px; padding: 14px; margin-bottom: 16px; color: #ff6b6b; font-size: 12px; font-family: monospace; word-break: break-all; white-space: pre-wrap; }

.result-row { padding: 14px 0; }
.result-row + .result-row { border-top: 1px solid #1a1a2e; }
.result-header { display: flex; justify-content: space-between; align-items: center; }
.result-player { color: #c9a227; font-weight: bold; }
.result-answer { color: #778899; margin-left: 10px; }
.result-identified { color: #556677; font-size: 11px; margin-left: 6px; font-style: italic; }
.result-score-wrap { display: flex; align-items: center; gap: 8px; }
.result-score { font-size: 24px; font-weight: bold; }
.result-reason { color: #778899; font-size: 12px; margin-top: 5px; }

.score-bar { width: 100%; height: 8px; background: #1a1a2e; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.score-bar-fill { height: 100%; border-radius: 4px; animation: slideBar 0.8s ease-out; }

.badge { padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
.badge-pointless { background: #00e676; color: #000; }
.badge-wrong { background: #dc3545; color: #fff; }

.top5-row { padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
.top5-row + .top5-row { border-top: 1px solid #1a1a2e; }
.top5-name { color: #00e676; font-weight: bold; }
.top5-reason { color: #555; font-size: 12px; margin-left: 10px; }
.top5-score { color: #00e676; font-size: 11px; font-weight: bold; white-space: nowrap; margin-left: 8px; }

.lb-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; }
.lb-row + .lb-row { border-top: 1px solid #1a1a2e; }
.lb-medal { margin-right: 10px; font-size: 17px; }
.lb-total { color: #c9a227; font-weight: bold; font-size: 19px; }

.winner-card { text-align: center; border-color: #c9a227; padding: 36px; animation: fadeIn 0.5s ease-out, pulseGlow 2s ease-in-out infinite; }
.winner-trophy { font-size: 52px; margin-bottom: 10px; }
.winner-name { color: #c9a227; font-size: 26px; font-weight: bold; margin-bottom: 4px; }
.winner-label { color: #778899; font-size: 13px; letter-spacing: 3px; }
.winner-score { color: #00e676; font-size: 36px; font-weight: bold; margin-top: 10px; }

.final-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; }
.final-row + .final-row { border-top: 1px solid #1a1a2e; }
.final-medal { margin-right: 12px; font-size: 20px; }
.final-name { font-size: 17px; }
.final-total { color: #c9a227; font-weight: bold; font-size: 21px; }

.footer { text-align: center; margin-top: 32px; color: #333; font-size: 11px; }
.hidden { display: none; }
</style>
</head>
<body>

    <p class="header-sub">The Football Quiz</p>
    <h1 class="header-title">POINTLESS</h1>
    <p class="header-tag">LOWEST SCORE WINS</p>

function grabJSON(str) {
  const s = str.indexOf("{"), e = str.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("No JSON found: " + str.slice(0, 400));
  return JSON.parse(str.slice(s, e + 1));
}
function sanitize(s) { return s.replace(/[^\x20-\x7E]/g, "").replace(/['"\\`]/g, "").trim(); }
function escapeHTML(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickUnique(arr, exclude) {
  let v; do { v = pick(arr); } while (v === exclude && arr.length > 1);
  return v;
}

async function callClaude(prompt, maxTokens, useWebSearch) {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: maxTokens || 1024,
    messages: [{ role: "user", content: prompt }]
  };
  if (useWebSearch) body.use_web_search = true;

  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const raw = await res.text();
  let data;
  try { data = JSON.parse(raw); } catch { throw new Error("Non-JSON: " + raw.slice(0, 400)); }
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));
  // Handle responses that may contain tool_use blocks (web search) — extract all text
  if (Array.isArray(data.content)) {
    return data.content.filter(b => b.type === "text").map(b => b.text).join("");
  }
  return data.content[0].text;
}

function showError(msg) { const el = document.getElementById("errorBox"); el.textContent = msg; el.classList.remove("hidden"); }
function hideError() { document.getElementById("errorBox").classList.add("hidden"); }
function showRoundBadge(text) { const el = document.getElementById("roundBadge"); el.textContent = text; el.classList.remove("hidden"); }

  if (s === 100) return "#dc3545";
  if (s === 0) return "#00e676";
  if (s <= 20) return "#4caf50";
  if (s <= 50) return "#ff9800";
  if (s <= 80) return "#f44336";
  return "#dc3545";
}

  if (s === 0) return "#00e676";
  if (s === 100) return "#dc3545";
  if (s <= 30) return "#4caf50";
  return "#e0e0e0";
}
function getLeaderboard() {
  return Object.entries(scores).sort((a, b) => a[1] - b[1]);

  { type:"international", w:2, t:"Name a player who appeared for {BIG6} in the Premier League and also played in a World Cup final" },
  { type:"international", w:1, t:"Name a player who scored in both the Premier League and a European Championship for their country" },
  { type:"international", w:1, t:"Name a player who has captained their national team AND a Premier League club" },

  // ── MANAGER (occasional) ──
  { type:"manager", w:2, t:"Name a manager who has managed {N}+ different Premier League clubs (pick N from 3,4,5)" },
  { type:"manager", w:2, t:"Name a manager who won the Premier League with a club that had never won it before" },
  { type:"manager", w:2, t:"Name a manager who has been relegated from the Premier League {N}+ times as a manager (pick N from 2,3)" },
  { type:"manager", w:1, t:"Name a foreign (non-British) manager who has won the Premier League" },
  { type:"manager", w:1, t:"Name a manager who took a club promoted to the Premier League and kept them up in their first season" },

  // ── PLAYER-MANAGER CROSSOVER (occasional) ──
  { type:"playermanager", w:2, t:"Name someone who has both scored {N}+ Premier League goals as a player AND managed a Premier League club (pick N from 50,100)" },
  { type:"playermanager", w:2, t:"Name someone who managed the same Premier League club they previously played for" },
  { type:"playermanager", w:2, t:"Name someone who won the Premier League as a player AND later managed a Premier League club" },
  { type:"playermanager", w:1, t:"Name someone who played in the Premier League and later managed a club in a different country's top division" },
  { type:"playermanager", w:1, t:"Name someone who scored a Premier League goal and later became a Premier League manager within 10 years of retiring" },
];

/* ─── Difficulty settings ─── */
const DIFF_CONFIG = {
  easy: {
    label: "Easy",
    desc: "Casual fans — well-known players, straightforward questions",
    answerRange: "15-40",
    instruction: "Pick questions where 15-40 correct answers exist. Favour well-known players and famous clubs. Avoid very obscure criteria."
  },
  medium: {
    label: "Medium",
    desc: "Regular watchers — mix of well-known and obscure",
    answerRange: "10-30",
    instruction: "Pick questions where 10-30 correct answers exist. Good mix of famous and obscure players."
  },
  hard: {
    label: "Hard",
    desc: "Football nerds — tough criteria, obscure answers",
    answerRange: "5-15",
    instruction: "Pick questions where only 5-15 correct answers exist. Use tighter criteria, less obvious thresholds, and more obscure clubs."
  }
};

/* ─── Template selection with anti-repeat category logic ─── */
function buildWeightedPool(excludeType) {
  const pool = [];
  TEMPLATE_POOL.forEach(entry => {
    if (entry.type === excludeType) return; // prevent back-to-back same type
    for (let i = 0; i < entry.w; i++) pool.push(entry);
  });
  return pool;
}

function fillTemplate(t) {
  const derby = pick(DERBIES);
  const clubA = pick(PL_CLUBS);
  const clubB = pickUnique(PL_CLUBS, clubA);
  const big6A = pick(BIG6);
  const big6B = pickUnique(BIG6, big6A);
  const natEasy = pick(NATIONALITIES_EASY);
  const natHard = pick(NATIONALITIES_HARD);
  const decades = ["1990", "2000", "2010", "2020"];
  const recentSeasons = ["2015/16", "2016/17", "2017/18", "2018/19", "2019/20", "2020/21", "2021/22", "2022/23", "2023/24"];

  return t
    .replace(/{BIG6_B}/g, big6B)
    .replace(/{BIG6}/g, big6A)
    .replace(/{DERBY_A}/g, derby[0])
    .replace(/{DERBY_B}/g, derby[1])
    .replace(/{CLUB_B}/g, clubB)
    .replace(/{CLUB_A}/g, clubA)
    .replace(/{CLUB}/g, clubA)
    .replace(/{NATIONALITY_EASY}/g, natEasy)
    .replace(/{NATIONALITY_HARD}/g, natHard)
    .replace(/{DECADE}/g, pick(decades))
    .replace(/{RECENT_SEASON}/g, pick(recentSeasons));
}

/* ─── Render Functions ─── */
function render(html) { document.getElementById("content").innerHTML = html; }

function renderSetup() {
  hideRoundBadge();
  hideError();

  let playersHTML = "";
  playerNames.forEach((name, i) => {
    playersHTML += `<div class="player-row">
      <span class="player-num">${i+1}.</span>
      <input type="text" id="p${i}" value="${escapeHTML(name)}" placeholder="Player ${i+1}" onkeydown="setupKeydown(event,${i})">
      ${playerNames.length > 1 ? `<button class="btn-remove" onclick="removePlayer(${i})">✕</button>` : ""}
    </div>`;
  });

  const roundsHTML = [3,5,7,10].map(n =>
    `<button class="btn-round ${numRounds===n?'active':''}" onclick="setRounds(${n})">${n}</button>`
  ).join("");

  const diffHTML = ["easy","medium","hard"].map(d =>
    `<button class="btn-round ${difficulty===d?'active':''}" onclick="setDifficulty('${d}')">${d.charAt(0).toUpperCase()+d.slice(1)}</button>`
  ).join("");

  const diffDesc = DIFF_CONFIG[difficulty].desc;

  render(`
    <div class="card">
      <label class="label">Players</label>
      ${playersHTML}
      ${playerNames.length < 6 ? `<button class="btn-outline" style="margin-top:4px;font-size:12px" onclick="addPlayer()">+ Add Player</button>` : ""}
    </div>
    <div class="card">
      <label class="label">Rounds</label>
      <div class="round-select">${roundsHTML}</div>
    </div>
    <div class="card diff-${difficulty}">
      <label class="label">Difficulty</label>
      <div class="diff-select">${diffHTML}</div>
      <div class="diff-desc">${diffDesc}</div>
    </div>
    <div class="center mt24">
      <button class="btn btn-big" onclick="startGame()">START GAME</button>
    </div>
  `);
}

function renderSpinner(msg) {
  render(`<div class="spinner"><div class="spinner-circle"></div><span class="spinner-text">${escapeHTML(msg)}</span></div>`);
}

function renderQuestion() {
  const diffTag = `<span class="difficulty-tag diff-tag-${difficulty}">${difficulty.toUpperCase()}</span>`;
  let inputsHTML = playerNames.map((name, i) => `
    <div class="mb12">
      <div class="player-name">${escapeHTML(name)}</div>
      <input type="text" id="ans${i}" placeholder="Type your answer..." onkeydown="answerKeydown(event,${i})">
    </div>
  `).join("");

  render(`
    <div class="card card-gold">
      ${diffTag}
      <div class="category">${escapeHTML(questionCategory)}</div>
      <div class="question-text">${escapeHTML(question)}</div>
    </div>
    <div class="card">
      <label class="label">Your Answers</label>
      ${inputsHTML}
      <div class="center mt12">
        <button class="btn" onclick="submitAnswers()">SUBMIT ANSWERS</button>
      </div>
    </div>
  `);
}

function renderResults() {
  let scoresHTML = roundResults.scores.map((s) => {
    let badge = "";
    if (s.score === 0) badge = `<span class="badge badge-pointless">POINTLESS!</span>`;
    else if (s.score === 100) badge = `<span class="badge badge-wrong">WRONG</span>`;

    // Show identified name if different from typed answer
    const identifiedSpan = (s.identified_as && s.identified_as.toLowerCase() !== s.answer.toLowerCase())
      ? `<span class="result-identified">(${escapeHTML(s.identified_as)})</span>`
      : "";

    return `<div class="result-row">
      <div class="result-header">
        <div>
          <span class="result-player">${escapeHTML(s.player)}</span>
          <span class="result-answer">"${escapeHTML(s.answer)}"</span>
          ${identifiedSpan}
        </div>
        <div class="result-score-wrap">
          <span class="result-score" style="color:${scoreTextColor(s.score)}">${s.score}</span>
          ${badge}
        </div>
      </div>
      <div class="result-reason">${escapeHTML(s.reason)}</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${Math.max(s.score,2)}%;background:${scoreColor(s.score)}"></div></div>
    </div>`;
  }).join("");

  let top5HTML = "";
  if (roundResults.top5 && roundResults.top5.length > 0) {
    top5HTML = `<div class="card"><label class="label">Pointless Answers You Could Have Given</label>` +
      roundResults.top5.map(t => `<div class="top5-row">
        <div style="flex:1"><span class="top5-name">${escapeHTML(t.answer)}</span><span class="top5-reason">${escapeHTML(t.reason)}</span></div>
        <span class="top5-score">0–15</span>
      </div>`).join("") + `</div>`;
  }

  const lb = getLeaderboard();
  let lbHTML = lb.map(([name, total], i) => `
    <div class="lb-row">
      <div><span class="lb-medal">${i < 3 ? medals[i] : (i+1)+"."}</span><span style="color:${i===0?"#c9a227":"#e0e0e0"}">${escapeHTML(name)}</span></div>
      <span class="lb-total">${total}</span>
    </div>
  `).join("");

  const btnText = currentRound >= numRounds ? "SEE FINAL RESULTS" : "NEXT ROUND →";

  render(`
    <div class="card"><label class="label">Round ${currentRound} Results</label>${scoresHTML}</div>
    ${top5HTML}
    <div class="card"><label class="label">Leaderboard</label>${lbHTML}</div>
    <div class="center mt16"><button class="btn" onclick="nextRound()">${btnText}</button></div>
  `);
}

function renderEnd() {
  hideRoundBadge();
  const lb = getLeaderboard();

  let finalHTML = lb.map(([name, total], i) => `
    <div class="final-row">
      <div><span class="final-medal">${i < 3 ? medals[i] : (i+1)+"."}</span>
      <span class="final-name" style="color:${i===0?"#c9a227":"#e0e0e0"};font-weight:${i===0?"bold":"normal"}">${escapeHTML(name)}</span></div>
      <span class="final-total">${total}</span>
    </div>
  `).join("");

  render(`
    <div class="card winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-name">${escapeHTML(lb[0][0])}</div>
      <div class="winner-label">POINTLESS CHAMPION</div>
      <div class="winner-score">${lb[0][1]} pts</div>
    </div>
    <div class="card"><label class="label">Final Standings</label>${finalHTML}</div>
    <div class="center mt24"><button class="btn btn-big" onclick="playAgain()">PLAY AGAIN</button></div>
  `);
}

/* ─── Actions ─── */
function syncPlayerInputs() {
  playerNames = playerNames.map((_, i) => {
    const el = document.getElementById("p" + i);
    return el ? el.value : playerNames[i];
  });
}
function addPlayer() {
  syncPlayerInputs();
  if (playerNames.length < 6) playerNames.push("");
  renderSetup();
  document.getElementById("p" + (playerNames.length - 1)).focus();
}
function removePlayer(i) {
  syncPlayerInputs();
  if (playerNames.length > 1) playerNames.splice(i, 1);
  renderSetup();
}
function setRounds(n) {
  syncPlayerInputs();
  numRounds = n;
  renderSetup();
}
function setDifficulty(d) {
  syncPlayerInputs();
  difficulty = d;
  renderSetup();
}
function setupKeydown(e, i) {
  if (e.key === "Enter") {
    syncPlayerInputs();
    if (playerNames.length < 6) addPlayer();
  }
}
function answerKeydown(e, i) {
  if (e.key === "Enter") {
    if (i + 1 < playerNames.length) {
      document.getElementById("ans" + (i + 1)).focus();
    } else {
      submitAnswers();
    }
  }
}

function startGame() {
  syncPlayerInputs();
  const names = playerNames.map(n => sanitize(n)).filter(n => n.length > 0);
  if (names.length === 0) return;
  playerNames = names;
  scores = {};
  names.forEach(n => scores[n] = 0);
  currentRound = 0;
  lastQuestionType = "";
  usedQuestions = [];
  usedTemplateKeys = [];
  generateQuestion();
}

async function generateQuestion() {
  hideError();
  roundResults = null;
  answers = {};
  showRoundBadge("Round " + (currentRound + 1) + " / " + numRounds);
  renderSpinner("Generating question...");

  // Pick 3 templates from weighted pool, avoiding last used type
  const pool = buildWeightedPool(lastQuestionType);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, 3);
  const filledTemplates = picked.map(e => ({ type: e.type, filled: fillTemplate(e.t) }));

  const avoid = usedQuestions.length > 0
    ? "Do NOT repeat or closely rephrase these previous questions: " + usedQuestions.slice(-6).join(" | ") + ". "
    : "";

  const diffCfg = DIFF_CONFIG[difficulty];

  const prompt = `You are a Premier League football quiz writer for the TV show Pointless (lowest score wins).

Pick ONE of these question templates and expand it into a specific, clear, answerable question:

1) [${filledTemplates[0].type.toUpperCase()}] ${filledTemplates[0].filled}
2) [${filledTemplates[1].type.toUpperCase()}] ${filledTemplates[1].filled}
3) [${filledTemplates[2].type.toUpperCase()}] ${filledTemplates[2].filled}

${avoid}

DIFFICULTY: ${diffCfg.label.toUpperCase()} — ${diffCfg.instruction}

Rules:
- Premier League era (1992-present) unless the template specifically mentions cups or international tournaments
- The question must have ${diffCfg.answerRange} valid correct answers
- State exact criteria with zero ambiguity — no vague phrasing
- Fill in ALL remaining placeholders with specific values
- Men's football only

Reply ONLY as JSON: {"question":"...","category":"2-3 word label","type":"the category type you chose e.g. club/stats/derby/nationality/season/cup/international/manager/playermanager"}`;

  try {
    const text = await callClaude(prompt, 1024, false);
    const parsed = grabJSON(text);
    question = parsed.question;
    questionCategory = parsed.category || "Premier League";
    questionType = parsed.type || filledTemplates[0].type;
    lastQuestionType = questionType;
    usedQuestions.push(question);
    renderQuestion();
  } catch (e) {
    showError(e.message);
    renderQuestion();
  }
}

async function submitAnswers() {
  const playerAnswers = playerNames.map((name, i) => {
    const el = document.getElementById("ans" + i);
    return { player: sanitize(name), answer: sanitize(el ? el.value : "") };
  });
  if (playerAnswers.some(p => !p.answer)) return;

  hideError();
  renderSpinner("Verifying & scoring answers...");

  const answersStr = playerAnswers.map(p => `${p.player}: "${p.answer}"`).join(", ");

  const prompt = `You are scoring a round of the Pointless Premier League Quiz. Use web search to verify any facts you are not 100% certain about before scoring.

QUESTION: "${sanitize(question)}"

ANSWERS TO SCORE: ${answersStr}

SCORING RULES — follow exactly:

STEP 1 — IDENTIFY THE PLAYER:
For each answer, work out who the player most likely is. Players often use just a surname (e.g. "Sterling" = Raheem Sterling) or misspell names (e.g. "De Bryne" = Kevin De Bruyne, "Semenyo" = Antoine Semenyo, "Bruun Larsen" = Jacob Bruun Larsen). Always identify the most likely real footballer intended. Do NOT penalise for spelling. Record the full correct name as "identified_as".

STEP 2 — VERIFY AGAINST THE QUESTION:
Once you have identified the player, use your football knowledge (and web search if needed) to check whether they genuinely meet the question criteria. Be thorough:
- Any Premier League appearance for a club counts — including loan spells, short stints, and recent transfers
- Use the most current information available — player transfers and records up to the present day count
- Nationality: always use the player's actual international nationality (Riyad Mahrez = Algerian, Mo Salah = Egyptian, Wilfried Zaha = Ivorian, Didier Drogba = Ivorian, N'Golo Kante = French, etc.)
- If verifying a stat (goals, appearances, etc.) search for the current figure

STEP 3 — SCORE:
- If the player meets the criteria: score 0–99 based on how well-known they are (scale below)
- If the player does NOT meet the criteria: score 100 (WRONG) — only do this when you are certain
- There is no middle ground — an answer is correct (0–99) or wrong (100)
- When in doubt after searching, assume correct and give a low score (20–40)

FAMILIARITY SCALE (for correct answers):
0 = POINTLESS: genuinely correct but almost nobody would name them
1–20 = Very obscure: only hardcore PL fans know
21–50 = Cult hero / fringe player: dedicated fans know, casuals probably don't
51–80 = Well known: regular PL watchers would name them
81–99 = Household names — the following MUST score 85–99: Shearer, Henry, Rooney, Lampard, Gerrard, Salah, Kane, De Bruyne, Ronaldo, Beckham, Haaland, Aguero, Cantona, Bergkamp, Scholes, Giggs, Drogba, Terry, Ferdinand, Van Persie, Suarez, Tevez, Vidic, Cole (Ashley), Fowler, Owen, Heskey, Keane (Roy), Yorke

TOP 5 OBSCURE ANSWERS:
Also provide 5 genuinely obscure correct answers to this question that score 0–15. Only include answers you are factually certain about. These should be real players who meet the criteria but are barely remembered.

Reply ONLY with this exact JSON (no other text):
{"scores":[{"player":"","answer":"","identified_as":"","score":0,"reason":"one sentence explanation"}],"top5":[{"answer":"full player name","reason":"why they qualify"}]}`;

  try {
    const text = await callClaude(prompt, 2000, true);
    const parsed = grabJSON(text);
    parsed.scores.forEach(s => {
      if (scores[s.player] !== undefined) scores[s.player] += s.score;
    });
    roundResults = parsed;
    currentRound++;
    showRoundBadge("Round " + currentRound + " / " + numRounds);
    renderResults();
  } catch (e) {
    showError(e.message);
    renderQuestion();
  }
}

function nextRound() {
  if (currentRound >= numRounds) {
    renderEnd();
  } else {
    generateQuestion();
  }
}

function playAgain() {
  playerNames = [""];
  numRounds = 5;
  difficulty = "medium";
  currentRound = 0;
  lastQuestionType = "";
  scores = {};
  question = null;
  roundResults = null;
  usedQuestions = [];
  usedTemplateKeys = [];
  hideError();
  renderSetup();
}

/* ─── Init ─── */
renderSetup();
</script>
</body>
</html>
