<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pointless Football Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: #c9a227; color: #000; }
body {
  font-family: Georgia, "Times New Roman", serif;
  background: #000000;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 20px 16px 48px;
}
#app { max-width: 640px; margin: 0 auto; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 0 8px rgba(201,162,39,0.2); } 50% { box-shadow: 0 0 20px rgba(201,162,39,0.5); } }
@keyframes slideBar { from { width: 0; } }

.header { text-align: center; margin-bottom: 32px; position: relative; }
.header-sub { color: #555; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
.header-title { color: #c9a227; font-size: 46px; font-weight: bold; margin: 2px 0; letter-spacing: 3px; text-shadow: 0 0 40px rgba(201,162,39,0.3); }
.header-tag { color: #555; font-size: 11px; letter-spacing: 4px; margin: 0; }
.round-badge { position: absolute; top: 0; right: 0; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 6px 14px; color: #c9a227; font-size: 13px; }

.card { background: #111111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; animation: fadeIn 0.3s ease-out; }
.card-gold { border-color: #c9a227; }

.label { color: #555; font-size: 12px; margin-bottom: 8px; display: block; letter-spacing: 2px; text-transform: uppercase; }

.game-info { color: #666; font-size: 13px; line-height: 1.6; }
.game-info span { color: #c9a227; font-weight: bold; }

input[type="text"] {
  width: 100%; padding: 11px 14px; background: #0a0a0a; border: 1px solid #2a2a2a;
  border-radius: 8px; color: #e0e0e0; font-family: Georgia, serif; font-size: 15px;
  outline: none; box-sizing: border-box; transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: #c9a227; }

.btn {
  padding: 12px 28px; background: #c9a227; color: #000; border: none; border-radius: 8px;
  font-family: Georgia, serif; font-size: 15px; font-weight: bold; cursor: pointer;
  letter-spacing: 1px; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-big { padding: 15px 52px; font-size: 17px; }
.btn-outline {
  padding: 9px 18px; background: transparent; color: #c9a227; border: 1px solid #c9a227;
  border-radius: 8px; font-family: Georgia, serif; font-size: 13px; cursor: pointer;
  transition: background 0.15s;
}
.btn-outline:hover { background: rgba(201,162,39,0.1); }
.btn-skip {
  padding: 9px 18px; background: transparent; color: #888; border: 1px solid #333;
  border-radius: 8px; font-family: Georgia, serif; font-size: 13px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.btn-skip:hover:not(:disabled) { border-color: #c9a227; color: #c9a227; }
.btn-skip:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-remove { padding: 4px 10px; background: transparent; color: #444; border: 1px solid #2a2a2a; border-radius: 6px; cursor: pointer; font-size: 12px; }

.player-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.player-num { color: #c9a227; font-size: 14px; min-width: 22px; }
.player-name { color: #c9a227; font-size: 13px; margin-bottom: 5px; }

.q-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }

.center { text-align: center; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.mt24 { margin-top: 24px; }
.mb12 { margin-bottom: 12px; }

.question-text { font-size: 18px; line-height: 1.55; color: #e8e8e8; }

.loading-wrap { display: flex; align-items: center; gap: 12px; padding: 20px 0; }
.loading-spinner { width: 22px; height: 22px; border: 2px solid #2a2a2a; border-top: 2px solid #c9a227; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
.loading-text { color: #c9a227; font-style: italic; font-size: 14px; }

.error-box { background: #110000; border: 1px solid #3a0000; border-radius: 8px; padding: 14px; margin-bottom: 16px; color: #ff6b6b; font-size: 12px; font-family: monospace; word-break: break-all; }

.result-row { padding: 14px 0; }
.result-row + .result-row { border-top: 1px solid #1a1a1a; }
.result-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
.result-player { color: #c9a227; font-weight: bold; }
.result-answer { color: #555; margin-left: 10px; }
.result-identified { color: #888; font-size: 11px; margin-left: 6px; font-style: italic; }
.result-score-wrap { display: flex; align-items: center; gap: 8px; }
.result-score { font-size: 24px; font-weight: bold; }
.score-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
.score-bar-fill { height: 100%; border-radius: 3px; animation: slideBar 0.8s ease-out; }

.badge { padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
.badge-pointless { background: #00e676; color: #000; }
.badge-wrong { background: #dc3545; color: #fff; }

.answer-list-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
.answer-list-row + .answer-list-row { border-top: 1px solid #1a1a1a; }
.answer-list-name { color: #e0e0e0; font-size: 14px; }
.answer-list-name.was-given { color: #c9a227; font-weight: bold; }
.answer-list-score { font-size: 13px; font-weight: bold; min-width: 36px; text-align: right; }

.lb-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; }
.lb-row + .lb-row { border-top: 1px solid #1a1a1a; }
.lb-medal { margin-right: 10px; font-size: 17px; }
.lb-total { color: #c9a227; font-weight: bold; font-size: 19px; }

.winner-card { text-align: center; border-color: #c9a227; padding: 36px; animation: fadeIn 0.5s ease-out, pulseGlow 2s ease-in-out infinite; }
.winner-trophy { font-size: 52px; margin-bottom: 10px; }
.winner-name { color: #c9a227; font-size: 26px; font-weight: bold; margin-bottom: 4px; }
.winner-label { color: #555; font-size: 13px; letter-spacing: 3px; }
.winner-score { color: #00e676; font-size: 36px; font-weight: bold; margin-top: 10px; }

.final-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; }
.final-row + .final-row { border-top: 1px solid #1a1a1a; }
.final-medal { margin-right: 12px; font-size: 20px; }
.final-name { font-size: 17px; }
.final-total { color: #c9a227; font-weight: bold; font-size: 21px; }

.alltime-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; gap: 8px; }
.alltime-row + .alltime-row { border-top: 1px solid #1a1a1a; }
.alltime-rank { color: #c9a227; font-size: 14px; min-width: 24px; font-weight: bold; }
.alltime-info { flex: 1; }
.alltime-name { color: #e0e0e0; font-size: 14px; font-weight: bold; }
.alltime-sub { color: #555; font-size: 11px; margin-top: 2px; }
.alltime-score { color: #c9a227; font-weight: bold; font-size: 18px; min-width: 40px; text-align: right; }

.hidden { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <p class="header-sub">The Football Quiz</p>
    <h1 class="header-title">POINTLESS</h1>
    <p class="header-tag">LOWEST SCORE WINS</p>
    <div id="roundBadge" class="round-badge hidden"></div>
  </div>
  <div id="errorBox" class="error-box hidden"></div>
  <div id="content"></div>
</div>

/* ─── Helpers ─── */
function escapeHTML(s) { const d = document.createElement("div"); d.textContent = String(s||""); return d.innerHTML; }
function sanitize(s) { return s.replace(/['"\\`]/g,"").trim(); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ─── Fuzzy Name Matching (local, fast) ─── */
function normName(s) {
  return String(s).toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .replace(/\s+/g," ").trim();
}

function localMatch(typed, answers) {
  if (!typed || typed.trim().length < 2) return null;
  const t = normName(typed);

  // Exact full match
  for (const a of answers) {
    if (normName(a.name) === t) return a;
  }

  // Ends-with match — handles compound surnames like "Santa Cruz", "Van Dijk", "Van Persie"
  for (const a of answers) {
    const n = normName(a.name);
    if (n.endsWith(" " + t) || n === t) return a;
  }

  // Starts-with match — "Cristiano" matches "Cristiano Ronaldo"
  for (const a of answers) {
    const n = normName(a.name);
    if (n.startsWith(t + " ") && t.length >= 4) return a;
  }

  // Single surname match (last word)
  for (const a of answers) {
    const parts = normName(a.name).split(" ");
    const surname = parts[parts.length - 1];
    if (surname === t && surname.length > 2) return a;
  }

  // Contains in either direction
  for (const a of answers) {
    const n = normName(a.name);
    if ((n.includes(t) || t.includes(n)) && Math.min(t.length, n.length) >= 4) return a;
  }

  return null;
}

/* ─── Claude API Matching (fallback for unmatched answers) ─── */
async function claudeMatch(unmatchedAnswers, allAnswers) {
  // Build a concise prompt — just matching, no scoring
  const answerNames = allAnswers.map(a => a.name).join(", ");
  const toMatch = unmatchedAnswers.map(u => `"${u.typed}"`).join(", ");

  const prompt = `You are matching player/team name inputs to a verified answer list for a football quiz.

Valid answers: ${answerNames}

Player inputs to match: ${toMatch}

For each input, find the best match from the valid answers list. Handle:
- Misspellings (Van Dike = Van Dijk, Seville = Sevilla, Santa Cruze = Roque Santa Cruz)
- Phonetic variants (Aguero = Sergio Aguero)
- Partial names (just surname or first name)
- Accents missing (Toure = Yaya Touré)
- Common nicknames

If confident of a match, return the EXACT name from the valid answers list.
If no reasonable match exists, return null.

Reply ONLY as JSON array in same order as inputs:
[{"input":"...","match":"exact name from list or null"}]`;

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) return null;
    const text = Array.isArray(data.content)
      ? data.content.filter(b => b.type === "text").map(b => b.text).join("")
      : data.content[0].text;
    const s = text.indexOf("["), e = text.lastIndexOf("]");
    if (s === -1 || e === -1) return null;
    return JSON.parse(text.slice(s, e + 1));
  } catch { return null; }
}

/* ─── UI Helpers ─── */
function render(html) { document.getElementById("content").innerHTML = html; }
function showError(msg) { const el = document.getElementById("errorBox"); el.textContent = msg; el.classList.remove("hidden"); }
function hideError() { document.getElementById("errorBox").classList.add("hidden"); }
function showRoundBadge(t) { const el = document.getElementById("roundBadge"); el.textContent = t; el.classList.remove("hidden"); }
function hideRoundBadge() { document.getElementById("roundBadge").classList.add("hidden"); }

function scoreColor(s) {
  if (s === 100) return "#2a2a2a";
  if (s === 0) return "#00e676";
  if (s <= 20) return "#4caf50";
  if (s <= 50) return "#ff9800";
  if (s <= 80) return "#f44336";
  return "#dc3545";
}
function scoreTextColor(s) {
  if (s === 0) return "#00e676";
  if (s === 100) return "#555";
  if (s <= 30) return "#4caf50";
  return "#e0e0e0";
}
function getLeaderboard() { return Object.entries(scores).sort((a,b) => a[1]-b[1]); }

/* ─── All-Time Leaderboard ─── */
function getAllTimeBoard() {
  try { return JSON.parse(localStorage.getItem("pl_alltime_v2") || "[]"); } catch { return []; }
}
function saveAllTimeBoard(board) {
  try { localStorage.setItem("pl_alltime_v2", JSON.stringify(board)); } catch {}
}
function submitToAllTime(entries) {
  // entries: array of {name, score, date}
  const board = getAllTimeBoard();
  entries.forEach(e => board.push(e));
  board.sort((a,b) => a.score - b.score);
  saveAllTimeBoard(board.slice(0, 5));
}
function renderAllTimeBoard() {
  const board = getAllTimeBoard();
  if (board.length === 0) return `<div style="color:#555;font-size:12px;font-style:italic;padding:8px 0">No completed games yet — finish a full 5-round game to appear here</div>`;
  return board.map((entry, i) => `
    <div class="alltime-row">
      <div class="alltime-rank">${i < 3 ? medals[i] : (i+1)+"."}</div>
      <div class="alltime-info">
        <div class="alltime-name">${escapeHTML(entry.name)}</div>
        <div class="alltime-sub">${escapeHTML(entry.date)} · 5 rounds</div>
      </div>
      <div class="alltime-score">${entry.score}</div>
    </div>`).join("");
}

  let playersHTML = "";
  playerNames.forEach((name, i) => {
    playersHTML += `<div class="player-row">

/* ─── Question ─── */
function pickQuestion() {
  const available = QUESTIONS.map((_,i) => i).filter(i => !usedQuestionIndices.includes(i));
  if (available.length === 0) { usedQuestionIndices = []; }
  const pool = QUESTIONS.map((_,i) => i).filter(i => !usedQuestionIndices.includes(i));
  return pick(pool);
}

function loadQuestion() {
  const idx = pickQuestion();
  usedQuestionIndices.push(idx);
  currentQuestion = QUESTIONS[idx];
}

function renderQuestion() {
  const inputsHTML = playerNames.map((name, i) => `
    <div class="mb12">
      <div class="player-name">${escapeHTML(name)}</div>
      <input type="text" id="ans${i}" placeholder="Type your answer..." onkeydown="answerKeydown(event,${i})">
    </div>
  `).join("");

  const skipDisabled = skipsRemaining <= 0 ? "disabled" : "";
  const skipLabel = skipsRemaining > 0
    ? `⟳ Skip Question (${skipsRemaining} left)`
    : `⟳ No Skips Left`;

  render(`
    <div class="card card-gold">
      <div class="question-text">${escapeHTML(currentQuestion.q)}</div>
    </div>
    <div class="card">
      <label class="label">Your Answers</label>
      ${inputsHTML}
      <div class="q-actions">
        <button class="btn-skip" onclick="skipQuestion()" ${skipDisabled}>${skipLabel}</button>
        <button class="btn" onclick="submitAnswers()">SUBMIT ANSWERS</button>
      </div>
    </div>
  `);
}

function skipQuestion() {
  if (skipsRemaining <= 0) return;
  skipsRemaining--;
  loadQuestion();
  renderQuestion();
}

/* ─── Submit & Score ─── */
async function submitAnswers() {
  const playerAnswers = playerNames.map((name,i) => {
    const el = document.getElementById("ans"+i);
    return { player: name, typed: sanitize(el ? el.value : "") };
  });
  if (playerAnswers.some(p => !p.typed)) return;

  // Show loading while Claude matches
  render(`
    <div class="card card-gold">
      <div class="question-text">${escapeHTML(currentQuestion.q)}</div>
    </div>
    <div class="card">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <span class="loading-text">Checking answers...</span>
      </div>
    </div>
  `);

  // Step 1: local fuzzy match all answers
  const results = playerAnswers.map(pa => {
    const matched = localMatch(pa.typed, currentQuestion.answers);
    return { player: pa.player, typed: pa.typed, matched };
  });

  // Step 2: for any unmatched, try Claude
  const unmatched = results.filter(r => !r.matched);
  if (unmatched.length > 0) {
    const claudeResults = await claudeMatch(unmatched, currentQuestion.answers);
    if (claudeResults) {
      claudeResults.forEach((cr, idx) => {
        if (cr.match) {
          const answer = currentQuestion.answers.find(a => normName(a.name) === normName(cr.match));
          if (answer) results.find(r => r.typed === unmatched[idx].typed && !r.matched).matched = answer;
        }
      });
    }
  }

  // Step 3: assign scores and accumulate
  roundResults = results.map(r => {
    const score = r.matched ? r.matched.score : 100;
    if (scores[r.player] !== undefined) scores[r.player] += score;
    return { ...r, score };
  });

  renderResults();
}

/* ─── Results ─── */
function renderResults() {
  const scoresHTML = roundResults.map(r => {
    let badge = "";
    if (r.score === 0) badge = `<span class="badge badge-pointless">POINTLESS!</span>`;
    else if (r.score === 100) badge = `<span class="badge badge-wrong">WRONG</span>`;
    const identifiedSpan = r.matched && normName(r.matched.name) !== normName(r.typed)
      ? `<span class="result-identified">(${escapeHTML(r.matched.name)})</span>` : "";
    return `<div class="result-row">
      <div class="result-header">
        <div>
          <span class="result-player">${escapeHTML(r.player)}</span>
          <span class="result-answer">"${escapeHTML(r.typed)}"</span>
          ${identifiedSpan}
        </div>
        <div class="result-score-wrap">
          <span class="result-score" style="color:${scoreTextColor(r.score)}">${r.score === 100 ? "✗" : r.score}</span>
          ${badge}
        </div>
      </div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${r.score === 100 ? 100 : Math.max(r.score,2)}%;background:${scoreColor(r.score)}"></div></div>
    </div>`;
  }).join("");

  // Full answer list — lowest to highest
  const givenNames = new Set(roundResults.filter(r => r.matched).map(r => normName(r.matched.name)));
  const sortedAnswers = [...currentQuestion.answers].sort((a,b) => a.score - b.score);
  const answerListHTML = sortedAnswers.map(a => {
    const wasGiven = givenNames.has(normName(a.name));
    return `<div class="answer-list-row">
      <span class="answer-list-name ${wasGiven?"was-given":""}">${escapeHTML(a.name)}${wasGiven?" ✓":""}</span>
      <span class="answer-list-score" style="color:${scoreTextColor(a.score)}">${a.score}</span>
    </div>`;
  }).join("");

  // Leaderboard
  const lb = getLeaderboard();
  const lbHTML = lb.map(([name,total],i) => `
    <div class="lb-row">
      <div><span class="lb-medal">${i<3?medals[i]:(i+1)+"."}</span>
      <span style="color:${i===0?"#c9a227":"#e0e0e0"}">${escapeHTML(name)}</span></div>
      <span class="lb-total">${total}</span>
    </div>`).join("");

  const isLastRound = currentRound >= NUM_ROUNDS;
  const btnText = isLastRound ? "SEE FINAL RESULTS" : "NEXT ROUND →";

  render(`
    <div class="card"><label class="label">Round ${currentRound} of ${NUM_ROUNDS} — Results</label>${scoresHTML}</div>
    <div class="card">
      <label class="label">All Answers — Lowest to Highest</label>
      ${answerListHTML}
    </div>
    <div class="card"><label class="label">Leaderboard</label>${lbHTML}</div>
    <div class="center mt16"><button class="btn" onclick="nextRound()">${btnText}</button></div>
  `);
}

/* ─── End Game ─── */
function renderEnd() {
  hideRoundBadge();
  const lb = getLeaderboard();
  const today = new Date().toLocaleDateString("en-GB");

  // Only completed full 5-round games enter leaderboard
  submitToAllTime(lb.map(([name, score]) => ({ name, score, date: today })));

  const finalHTML = lb.map(([name,total],i) => `
    <div class="final-row">
      <div><span class="final-medal">${i<3?medals[i]:(i+1)+"."}</span>
      <span class="final-name" style="color:${i===0?"#c9a227":"#e0e0e0"};font-weight:${i===0?"bold":"normal"}">${escapeHTML(name)}</span></div>
      <span class="final-total">${total}</span>
    </div>`).join("");

  render(`
    <div class="card winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-name">${escapeHTML(lb[0][0])}</div>
      <div class="winner-label">POINTLESS CHAMPION</div>
      <div class="winner-score">${lb[0][1]} pts</div>
    </div>
    <div class="card"><label class="label">Final Standings</label>${finalHTML}</div>
    <div class="card">
      <label class="label">🏆 All-Time Leaderboard</label>
      ${renderAllTimeBoard()}
    </div>
    <div class="center mt24"><button class="btn btn-big" onclick="playAgain()">PLAY AGAIN</button></div>
  `);
}

/* ─── Actions ─── */
function syncPlayerInputs() {
  playerNames = playerNames.map((_,i) => { const el = document.getElementById("p"+i); return el ? el.value : playerNames[i]; });
}
function addPlayer() { syncPlayerInputs(); if (playerNames.length < 6) playerNames.push(""); renderSetup(); document.getElementById("p"+(playerNames.length-1)).focus(); }
function removePlayer(i) { syncPlayerInputs(); if (playerNames.length > 1) playerNames.splice(i,1); renderSetup(); }
function setupKeydown(e,i) { if (e.key==="Enter") { syncPlayerInputs(); if (playerNames.length<6) addPlayer(); } }
function answerKeydown(e,i) {
  if (e.key==="Enter") {
    if (i+1 < playerNames.length) document.getElementById("ans"+(i+1)).focus();
    else submitAnswers();
  }
}

function startGame() {
  syncPlayerInputs();
  const names = playerNames.map(n => sanitize(n)).filter(n => n.length > 0);
  if (names.length === 0) return;
  playerNames = names;
  scores = {};
  names.forEach(n => scores[n] = 0);
  currentRound = 0;
  skipsRemaining = MAX_SKIPS;
  usedQuestionIndices = [];
  nextRound();
}

function nextRound() {
  if (currentRound >= NUM_ROUNDS) { renderEnd(); return; }
  hideError();
  roundResults = null;
  currentRound++;
  showRoundBadge("Round " + currentRound + " / " + NUM_ROUNDS);
  loadQuestion();
  renderQuestion();
}

function playAgain() {
  playerNames = [""]; currentRound = 0; skipsRemaining = MAX_SKIPS;
  scores = {}; currentQuestion = null; roundResults = null;
  usedQuestionIndices = [];
  hideError(); renderSetup();
}

/* ─── Init ─── */
renderSetup();
</script>
</body>
</html>
